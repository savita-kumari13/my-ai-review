name: 'Ollama AI Code Review'
description: 'AI code review using Ollama following sage-review pattern'
author: 'Savita Kumari'

inputs:
  github-token:
    description: 'GitHub token'
    required: true
  pr-number:
    description: 'PR number'
    required: true
  model:
    description: 'Ollama model'
    required: false
    default: 'codellama:7b'

runs:
  using: 'composite'
  steps:
    - name: Setup Ollama
      shell: bash
      run: |
        echo "Installing Ollama..."
        curl -fsSL https://ollama.ai/install.sh | sh
        ollama serve &
        sleep 15
        echo "Pulling model: ${{ inputs.model }}"
        ollama pull ${{ inputs.model }}
        echo "Ollama ready"

    - name: Get changed files via GitHub API
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        PR_NUMBER: ${{ inputs.pr-number }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: |
        echo "Getting changed files..."
        chmod +x ${{ github.action_path }}/scripts/ollama-cli.sh
        ${{ github.action_path }}/scripts/ollama-cli.sh get-changed-files --pr "$PR_NUMBER" --repo "$GITHUB_REPOSITORY"

    - name: Run AI code review
      shell: bash
      env:
        MODEL: ${{ inputs.model }}
        OLLAMA_HOST: "http://localhost:11434"
      run: |
        echo "Running AI code review..."
        if [ -f ".ai-review/output/code-files.txt" ]; then
          FILES=$(cat .ai-review/output/code-files.txt | tr '\n' ',' | sed 's/,$//')
          if [ -n "$FILES" ]; then
            ${{ github.action_path }}/scripts/ollama-cli.sh review --files "$FILES" --model "$MODEL"
          else
            echo "No code files to review"
          fi
        else
          echo "No changed files found"
        fi

    - name: Post PR comment
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        PR_NUMBER: ${{ inputs.pr-number }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: |
        echo "Posting review to PR..."
        if [ -f ".ai-review/output/full-review.md" ]; then
          REVIEW_CONTENT=$(cat .ai-review/output/full-review.md)
          COMMENT_BODY="## AI Code Review Results\n\n$REVIEW_CONTENT\n\n---\n*Powered by ${{ inputs.model }}*"
          COMMENT_JSON=$(echo "$COMMENT_BODY" | jq -Rs '{"body": .}')
          curl -X POST -H "Authorization: token $GITHUB_TOKEN" -H "Accept: application/vnd.github.v3+json" "https://api.github.com/repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" -d "$COMMENT_JSON"
          echo "Review posted to PR"
        else
          echo "No review results to post"
        fi

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: ai-review-results
        path: .ai-review/output/
        retention-days: 7

branding:
  icon: 'eye'
  color: 'purple'